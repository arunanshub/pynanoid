name: CI

on:
  workflow_dispatch:
  push:
    branches: [master]
    tags: ["v*.*.*"]
  pull_request:
    branches: [master]

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  # enable caching for faster compilation
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  rust:
    name: Rust checks on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository 👁️
        uses: actions/checkout@v5

      - name: Install mold linker 🔗
        if: runner.os != 'Windows'
        uses: rui314/setup-mold@v1

      - name: Install Rust 🦀
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Run sccache-cache 🗄️
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Setup Rust cache 🗄️
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-nextest 🚢
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Check Rust formatting 🖌️
        run: cargo fmt --check --all

      - name: Run cargo check 🚢
        run: cargo check --workspace --all-features

      - name: Run clippy lint 🧹
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run Rust tests 🧪
        run: cargo nextest run --all-features --workspace --release
        env:
          PROPTEST_CASES: 5000

  test:
    name: Test on ${{ matrix.os }} with Python ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository 👁️
        uses: actions/checkout@v5

      - name: Install mold linker 🔗
        if: runner.os != 'Windows'
        uses: rui314/setup-mold@v1

      - name: Install Rust 🦀
        uses: dtolnay/rust-toolchain@stable

      - name: Run sccache-cache 🗄️
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Setup Rust cache 🗄️
        uses: Swatinem/rust-cache@v2

      - name: Install uv 🌞
        uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install Python dependencies 📦
        run: uv sync --group dev

      - name: Check Python formatting 🖌️
        run: uv run ruff format --check .

      - name: Lint Python 🧹
        run: uv run ruff check .

      - name: Check Python typing 🔤
        run: uv run mypy .

      - name: Run Python tests 🧪
        run: >-
          uv run pytest -n auto -d
          --cov=src/ --cov-report=xml --cov-branch
          --benchmark-disable --benchmark-skip

      - name: Upload coverage report to Codecov ☂️
        uses: codecov/codecov-action@v7
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-13, macos-14]

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository 👁️
        uses: actions/checkout@v5

      - name: Install mold linker 🔗
        if: runner.os != 'Windows'
        uses: rui314/setup-mold@v1

      - name: Install Rust 🦀
        uses: dtolnay/rust-toolchain@stable

      - name: Run sccache-cache 🗄️
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Setup Rust cache 🗄️
        uses: Swatinem/rust-cache@v2

      - name: Build wheels 🛞
        uses: pypa/cibuildwheel@v4.1.0
        env:
          CIBW_BUILD_FRONTEND: build[uv]

      - name: Upload wheel artifacts 🫖
        uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository 👁️
        uses: actions/checkout@v5

      - name: Install uv 🌞
        uses: astral-sh/setup-uv@v8.3.2

      - name: Build sdist 📦
        run: uv build --sdist

      - name: Upload sdist artifact 🫖
        uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    if: success() && startsWith(github.ref, 'refs/tags/v')
    needs: [rust, test, build-wheels, build-sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Fetch wheel and sdist from artifacts 🫖
        uses: actions/download-artifact@v4
        with:
          pattern: cibw-*
          merge-multiple: true
          path: dist/

      - name: Publish to PyPI 📦
        uses: pypa/gh-action-pypi-publish@release/v1
